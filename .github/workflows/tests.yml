name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    timeout-minutes: 10
    name: Node v${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set git config
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.symlinks true
        if: runner.os == 'Windows'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 #latest v4. TODO upgrade
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 #latest  v3. TODO upgrade
        with:
          node-version: ${{ matrix.node-version }}
      - name: Create the npm cache directory
        run: mkdir npm-cache && npm config set cache ./npm-cache --global
      - name: Cache node modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 #latest v3 TODO upgrade
        with:
          path: ./npm-cache
          key: v1-${{ runner.os }}-node-${{ matrix.node-version }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-${{ runner.os }}-node-${{ matrix.node-version }}-npm-
      - run: npm ci
      - run: npm run build
        env:
          CI: true
      - run: npm run test:unit
        env:
          CI: true
      - run: npm run test:integration
        env:
          CI: true
      - run: npm run test:end-to-end
        env:
          CI: true
      - run: npx playwright install chromium
      - run: npm run test:browser:run
        env:
          CI: true

  benchmark:
    timeout-minutes: 15
    name: Measure performance impact of changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 #latest v4. TODO upgrade
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 #latest  v3. TODO upgrade
        with:
          node-version: 24
      - name: Create the npm cache directory
        run: mkdir npm-cache && npm config set cache ./npm-cache --global
      - name: Cache node modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 #latest v3 TODO upgrade
        with:
          path: ./npm-cache
          key: v1-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-npm-
      - run: npm ci
      - run: npm run benchmark
        env:
          CI: true

  typescript:
    timeout-minutes: 15
    name: Ensure typescript compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 #latest v4. TODO upgrade
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 #latest  v3. TODO upgrade
        with:
          node-version: 24
      - name: Create the npm cache directory
        run: mkdir npm-cache && npm config set cache ./npm-cache --global
      - name: Cache node modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5 #latest v3 TODO upgrade
        with:
          path: ./npm-cache
          key: v1-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v1-npm-
      - run: npm ci
      - run: tsc --noEmit -p tsconfig.check-types.json
        env:
          CI: true
